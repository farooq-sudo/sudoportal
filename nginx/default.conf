# ─────────────────────────────────────────────────────────────────────────────
#  nginx/default.conf — serves the HTML portals and reverse-proxies the API.
# ─────────────────────────────────────────────────────────────────────────────

upstream sudo_api {
  server api:3000;
  keepalive 32;
}

server {
  listen 80;
  listen [::]:80;
  server_name _;

  # ── Static portals ────────────────────────────────────────────────────────
  # Files live in /usr/share/nginx/html (mounted from ./apps/web).
  # The launcher index.html at root, then admin/, hr/, pm/, employee/,
  # team_lead/, shared/ resolve as subdirectories.
  root /usr/share/nginx/html;
  index index.html;

  # Sensible cache headers per asset type
  location ~* \.(css|js|svg|woff2|woff|ttf|jpg|jpeg|png|webp|gif|ico)$ {
    expires 1d;
    add_header Cache-Control "public, max-age=86400";
  }

  # HTML never cached so user always gets latest
  location ~* \.html$ {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    expires off;
  }

  # ── Reverse-proxy the API ─────────────────────────────────────────────────
  # Any /api/* request goes to the api container.
  # Note: the Fastify app prefixes its routes with /api/v1, and we do NOT
  # rewrite the path — we forward it as-is so /api/v1/health hits the right
  # handler.
  location /api/ {
    proxy_pass         http://sudo_api;
    proxy_http_version 1.1;

    # Standard forwarding headers — the Fastify app honours these because
    # it's configured with `trustProxy: true`.
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Forwarded-Host  $host;
    proxy_set_header   Connection        "";

    # Reasonable timeouts — most API calls are well under a second
    proxy_connect_timeout 5s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;

    # Don't buffer streaming responses (e.g. SSE if we ever add it)
    proxy_buffering    off;
  }

  # SPA-style fallback for the launcher (helps if user opens /admin/ without
  # the trailing index.html). Try a literal file first, then the directory's
  # index, then 404.
  location / {
    try_files $uri $uri/ $uri/index.html =404;
  }

  # ── Health endpoint at the proxy level (independent of API) ───────────────
  location = /nginx-health {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }

  # ── Reasonable defaults ───────────────────────────────────────────────────
  client_max_body_size 5m;       # accommodates ≤2MB photo uploads + headers
  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  gzip_min_length 256;

  # Don't leak nginx version
  server_tokens off;
}
