<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Team Lead Portal · SUDO Employee Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../shared/filterbar.css" />
<link rel="stylesheet" href="styles.css" />
</head>
<body class="theme-tl">

<aside class="sidebar">
  <div class="brand">
    <div class="brand__mark">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 6h12a4 4 0 0 1 0 8H8a4 4 0 0 0 0 8h12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="brand__text">
      <div class="brand__name">SUDO</div>
      <div class="brand__sub">Employee Portal</div>
    </div>
  </div>

  <div class="role-switch">
    <div class="role-switch__label">Signed in as</div>
    <button class="role-switch__btn" id="role-switch-btn">
      <span class="role-pill role-pill--tl">TL</span>
      <span class="role-switch__name">Khalid Mansour</span>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>

  <nav class="nav" id="nav">
    <div class="nav__group">
      <div class="nav__heading">Team Lead Workspace</div>
    </div>
  </nav>

  <div class="sidebar__foot">
    <div class="sidebar__foot-team">
      <div class="sidebar__foot-team-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM5 21v-2a4 4 0 014-4h6a4 4 0 014 4v2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </div>
      <div class="sidebar__foot-text">
        <div>My direct reports</div>
        <div class="sidebar__foot-sub">12 people · Cloud Engineering</div>
      </div>
    </div>
  </div>
</aside>

<main class="main">
  <header class="topbar">
    <div class="topbar__left">
      <h1 id="page-title">Team Lead Dashboard</h1>
      <div id="page-breadcrumb" class="page-breadcrumb"></div>
    </div>
    <div class="topbar__right">
      <div class="search">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <input placeholder="Search team member, project…" />
        <kbd>⌘K</kbd>
      </div>
      <button class="icon-btn icon-btn--notif" id="notif-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M18 8a6 6 0 10-12 0c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="notif-dot">4</span>
      </button>
      <button class="btn btn--primary btn--sm" id="quick-rate">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
        Rate a member
      </button>
    </div>
  </header>

  <div id="page-content"></div>
</main>

<div class="overlay" id="overlay"></div>
<aside class="slideover" id="slideover">
  <header class="slideover__head">
    <button class="icon-btn" id="slideover-close">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
    <h3 id="slideover-title">Detail</h3>
  </header>
  <div class="slideover__body" id="slideover-body"></div>
</aside>

<div class="notif-dropdown" id="notif-dropdown">
  <header class="notif-dropdown__head">
    <h4>Notifications</h4>
    <a href="#">Mark all read</a>
  </header>
  <div class="notif-dropdown__body" id="notif-body"></div>
</div>

<div class="toast" id="toast"></div>

<script src="../shared/filterbar.js"></script>
<script src="../shared/pagination.js"></script>
<script src="../shared/role-switcher.js"></script>
<script src="../shared/charts.js"></script>
<script src="../shared/layout-prefs.js"></script>
<script src="../shared/api.js"></script>
  <script src="../shared/auth.js"></script>
  <script src="../shared/db.js"></script>
  <script src="../shared/hydrate.js"></script>
<script src="dashboard.js"></script>
</body>
</html>
