<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUDO Portal · Database Schema</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --ink-900: #0F1B2D;
    --ink-800: #1B2A3F;
    --ink-700: #334155;
    --ink-500: #64748B;
    --ink-300: #CBD5E1;
    --ink-200: #E2E8F0;
    --ink-100: #F1F5F9;
    --ink-50:  #F8FAFC;
    --paper:   #FBFCFE;

    --navy:      #0F2548;
    --navy-deep: #061533;
    --bright:    #2563EB;
    --teal:      #0891B2;
    --green:     #15803D;
    --amber:     #B45309;
    --red:       #B91C1C;
    --purple:    #6D28D9;
    --pink:      #BE185D;
    --orange:    #C2410C;

    /* Cluster colors */
    --c-core:        #2563EB;
    --c-kpi:         #15803D;
    --c-onboarding:  #B45309;
    --c-training:    #6D28D9;
    --c-performance: #BE185D;
    --c-system:      #475569;
    --c-integration: #0891B2;

    --font-display: 'Plus Jakarta Sans', sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--paper); color: var(--ink-900); font-family: var(--font-display); }

  /* ─── Header ─────────────────────────────────────────────────── */
  header {
    position: sticky; top: 0; z-index: 30;
    background: var(--navy-deep);
    color: white;
    padding: 14px 24px;
    display: flex; align-items: center; gap: 20px;
    border-bottom: 1px solid var(--ink-200);
    box-shadow: 0 1px 0 rgba(255,255,255,0.05) inset, 0 4px 14px rgba(15,37,72,0.08);
  }
  header .logo {
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 1.5px;
    color: #C7D8EE;
    text-transform: uppercase;
  }
  header h1 {
    font-size: 16px;
    margin: 0;
    font-weight: 700;
    letter-spacing: -0.2px;
  }
  header .meta {
    color: #93B0D6;
    font-size: 12px;
    font-family: var(--font-mono);
    margin-left: auto;
  }
  header .meta strong { color: white; font-weight: 600; }

  /* ─── Toolbar ─────────────────────────────────────────────────── */
  .toolbar {
    position: sticky; top: 50px; z-index: 29;
    background: white;
    border-bottom: 1px solid var(--ink-200);
    padding: 10px 24px;
    display: flex; gap: 14px; align-items: center; flex-wrap: wrap;
    font-size: 12px;
  }
  .toolbar input[type="search"] {
    border: 1px solid var(--ink-300);
    border-radius: 6px;
    padding: 6px 10px;
    font-family: var(--font-mono);
    font-size: 12px;
    width: 200px;
    background: var(--ink-50);
  }
  .toolbar input[type="search"]:focus { outline: 2px solid var(--bright); border-color: var(--bright); background: white; }
  .legend { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .legend__item {
    display: inline-flex; align-items: center; gap: 5px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-700);
    padding: 4px 8px;
    border-radius: 4px;
    background: var(--ink-50);
    cursor: pointer;
    transition: all .15s;
    border: 1px solid transparent;
  }
  .legend__item:hover { background: var(--ink-100); border-color: var(--ink-200); }
  .legend__item--active { background: white; border-color: var(--ink-300); }
  .legend__swatch {
    width: 10px; height: 10px; border-radius: 2px;
  }
  .toolbar__btn {
    background: var(--ink-900);
    color: white;
    border: none;
    border-radius: 6px;
    padding: 6px 12px;
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 12px;
    cursor: pointer;
  }
  .toolbar__btn:hover { background: var(--bright); }
  .toolbar__hint {
    font-size: 11px;
    color: var(--ink-500);
    font-family: var(--font-mono);
    margin-left: auto;
  }

  /* ─── Canvas ──────────────────────────────────────────────────── */
  .canvas-wrap {
    position: relative;
    width: 100%;
    height: calc(100vh - 50px - 50px);
    overflow: auto;
    background:
      linear-gradient(to right, var(--ink-100) 1px, transparent 1px) 0 0 / 32px 32px,
      linear-gradient(to bottom, var(--ink-100) 1px, transparent 1px) 0 0 / 32px 32px,
      radial-gradient(circle at 1px 1px, var(--ink-200) 1px, transparent 1px) 0 0 / 32px 32px,
      var(--paper);
  }
  .canvas {
    position: relative;
    width: var(--canvas-w, 2400px);
    height: var(--canvas-h, 1700px);
    transform-origin: 0 0;
    transition: transform .25s;
  }

  /* ─── Cluster grouping ────────────────────────────────────────── */
  .cluster {
    position: absolute;
    border: 2px dashed var(--ink-300);
    border-radius: 14px;
    background: rgba(255,255,255,0.4);
    backdrop-filter: blur(1px);
  }
  .cluster__label {
    position: absolute;
    top: -12px; left: 16px;
    background: var(--paper);
    padding: 0 10px;
    font-family: var(--font-mono);
    font-size: 10.5px;
    font-weight: 700;
    color: var(--ink-700);
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }
  .cluster__label::before {
    content: '';
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 2px;
    margin-right: 6px;
    vertical-align: 1px;
    background: var(--c);
  }

  /* ─── Tables ──────────────────────────────────────────────────── */
  .table {
    position: absolute;
    background: white;
    border: 1px solid var(--ink-300);
    border-radius: 8px;
    box-shadow: 0 2px 4px rgba(15,37,72,0.04), 0 6px 16px rgba(15,37,72,0.06);
    font-family: var(--font-mono);
    font-size: 11px;
    overflow: hidden;
    transition: box-shadow .15s, transform .15s, opacity .2s;
    cursor: pointer;
  }
  .table:hover {
    box-shadow: 0 4px 8px rgba(15,37,72,0.08), 0 12px 28px rgba(15,37,72,0.12);
    transform: translateY(-1px);
    z-index: 5;
  }
  .table--highlight {
    box-shadow: 0 0 0 3px var(--bright), 0 12px 28px rgba(37,99,235,0.25) !important;
    z-index: 10;
  }
  .table--connected {
    box-shadow: 0 0 0 2px var(--teal), 0 6px 16px rgba(8,145,178,0.18) !important;
    z-index: 8;
  }
  .table--dimmed {
    opacity: 0.22;
  }
  .table__head {
    background: var(--c, var(--navy));
    color: white;
    padding: 7px 11px;
    display: flex; justify-content: space-between; align-items: center;
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 12.5px;
  }
  .table__head-icon {
    font-size: 10px;
    opacity: 0.7;
    font-family: var(--font-mono);
    font-weight: 500;
  }
  .table__body {
    padding: 0;
  }
  .table__field {
    display: flex; align-items: center; justify-content: space-between;
    padding: 4px 11px;
    border-bottom: 1px solid var(--ink-100);
    gap: 8px;
  }
  .table__field:last-child { border-bottom: none; }
  .table__fname { color: var(--ink-900); font-weight: 500; }
  .table__fname--pk { color: var(--bright); font-weight: 700; }
  .table__fname--fk { color: var(--teal); }
  .table__fname--unique { color: var(--purple); }
  .table__ftype { color: var(--ink-500); font-size: 10px; }
  .table__pk-icon {
    display: inline-block;
    width: 10px; text-align: center;
    margin-right: 4px;
    font-weight: 900;
    color: var(--amber);
  }
  .table__fk-icon {
    display: inline-block;
    width: 10px; text-align: center;
    margin-right: 4px;
    color: var(--teal);
  }
  .table__more {
    padding: 5px 11px;
    background: var(--ink-50);
    color: var(--ink-500);
    font-size: 10px;
    text-align: center;
    border-top: 1px solid var(--ink-100);
    cursor: pointer;
  }
  .table__more:hover { background: var(--ink-100); color: var(--ink-900); }

  /* ─── Relationship lines (SVG overlay) ─────────────────────────── */
  .lines {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
  }
  .lines path {
    fill: none;
    stroke: var(--ink-300);
    stroke-width: 1.5;
    transition: stroke .15s, stroke-width .15s, opacity .2s;
  }
  .lines path.line--highlight {
    stroke: var(--bright);
    stroke-width: 2.5;
    z-index: 9;
  }
  .lines path.line--dimmed { opacity: 0.18; }

  /* ─── Detail drawer ────────────────────────────────────────────── */
  .drawer {
    position: fixed;
    top: 50px; right: -480px;
    width: 460px;
    height: calc(100vh - 50px);
    background: white;
    box-shadow: -10px 0 30px rgba(15,37,72,0.12);
    z-index: 40;
    transition: right .3s cubic-bezier(.4,0,.2,1);
    overflow-y: auto;
    border-left: 1px solid var(--ink-200);
  }
  .drawer--open { right: 0; }
  .drawer__head {
    padding: 18px 22px 14px;
    border-bottom: 1px solid var(--ink-200);
    background: var(--c, var(--navy-deep));
    color: white;
    position: sticky; top: 0;
  }
  .drawer__title {
    margin: 0;
    font-size: 18px;
    font-weight: 700;
    font-family: var(--font-mono);
    letter-spacing: -0.2px;
  }
  .drawer__subtitle {
    margin: 4px 0 0;
    font-size: 11.5px;
    color: rgba(255,255,255,0.75);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    font-weight: 600;
  }
  .drawer__close {
    position: absolute; top: 14px; right: 14px;
    background: rgba(255,255,255,0.1);
    color: white; border: none;
    width: 28px; height: 28px;
    border-radius: 50%;
    cursor: pointer; font-size: 16px;
    display: grid; place-items: center;
  }
  .drawer__close:hover { background: rgba(255,255,255,0.2); }
  .drawer__body { padding: 18px 22px; }
  .drawer__section { margin-bottom: 20px; }
  .drawer__section-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--ink-500);
    font-weight: 700;
    margin: 0 0 8px;
  }
  .drawer__desc {
    font-size: 13px;
    color: var(--ink-700);
    line-height: 1.55;
    margin: 0;
  }
  .drawer__field {
    display: grid; grid-template-columns: 1fr auto;
    padding: 6px 0;
    border-bottom: 1px solid var(--ink-100);
    font-family: var(--font-mono);
    font-size: 12px;
    gap: 8px;
    align-items: center;
  }
  .drawer__field:last-child { border-bottom: none; }
  .drawer__field-name { color: var(--ink-900); }
  .drawer__field-name--pk { color: var(--bright); font-weight: 700; }
  .drawer__field-name--fk { color: var(--teal); }
  .drawer__field-name--unique { color: var(--purple); }
  .drawer__field-type { color: var(--ink-500); font-size: 11px; }
  .drawer__field-badge {
    display: inline-block;
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-left: 5px;
    vertical-align: 1px;
  }
  .drawer__field-badge--pk { background: #DBEAFE; color: var(--bright); }
  .drawer__field-badge--fk { background: #CFFAFE; color: var(--teal); }
  .drawer__field-badge--unique { background: #EDE9FE; color: var(--purple); }
  .drawer__field-badge--idx { background: #FEF3C7; color: var(--amber); }
  .drawer__rel {
    display: flex; justify-content: space-between; align-items: center;
    padding: 7px 0;
    border-bottom: 1px solid var(--ink-100);
    font-size: 12.5px;
  }
  .drawer__rel:last-child { border-bottom: none; }
  .drawer__rel-target {
    font-family: var(--font-mono);
    color: var(--bright);
    cursor: pointer;
    font-weight: 600;
  }
  .drawer__rel-target:hover { text-decoration: underline; }
  .drawer__rel-kind {
    color: var(--ink-500);
    font-size: 10.5px;
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* ─── Print / responsive ──────────────────────────────────────── */
  @media (max-width: 700px) {
    .toolbar { padding: 8px 12px; gap: 8px; }
    .toolbar input[type="search"] { width: 100%; }
    .drawer { width: 100%; right: -100%; }
    header { padding: 10px 14px; gap: 10px; }
    header h1 { font-size: 13px; }
    header .meta { display: none; }
  }
</style>
</head>
<body>

<header>
  <span class="logo">SUDO</span>
  <h1>Portal · Database Schema</h1>
  <span class="meta"><strong>73</strong> tables · <strong>21</strong> clusters · PostgreSQL 16 / Prisma 5</span>
</header>

<div class="toolbar">
  <input type="search" id="search" placeholder="Search tables or fields…" />

</div>

<div class="canvas-wrap" id="canvasWrap">
  <div class="canvas" id="canvas">
    <svg class="lines" id="lines" viewBox="0 0 2400 1700" preserveAspectRatio="none"></svg>
  </div>
</div>

<aside class="drawer" id="drawer">
  <div class="drawer__head" id="drawerHead">
    <h2 class="drawer__title" id="drawerTitle">—</h2>
    <p class="drawer__subtitle" id="drawerSubtitle">—</p>
    <button class="drawer__close" id="drawerClose" aria-label="Close">×</button>
  </div>
  <div class="drawer__body" id="drawerBody"></div>
</aside>

      { n: "lastSuccessAt", t: "DateTime?" },
      { n: "lastFailureAt", t: "DateTime?" },
      { n: "createdBy", t: "String?" },
      { n: "createdAt", t: "DateTime" },
      { n: "updatedAt", t: "DateTime" }
    ],
    rels: [
      { to: "WebhookDelivery", kind: "→" }
    ],
  },
};
// ────────────────────────────────────────────────────────────────────────────
//  RENDERING
// ────────────────────────────────────────────────────────────────────────────

// Cluster bounding boxes — computed lazily in renderClusters()
const CLUSTER_BOXES = {};

const canvas = document.getElementById("canvas");
const lines  = document.getElementById("lines");
const drawer = document.getElementById("drawer");
const drawerHead = document.getElementById("drawerHead");
const drawerTitle = document.getElementById("drawerTitle");
const drawerSubtitle = document.getElementById("drawerSubtitle");
const drawerBody = document.getElementById("drawerBody");
const drawerClose = document.getElementById("drawerClose");
const searchInput = document.getElementById("search");
const resetBtn = document.getElementById("reset");
const legend = document.getElementById("legend");

let selectedTable = null;
let activeClusters = new Set(Object.keys(CLUSTERS)); // all visible by default

function tableHeight(name) {
  // 30px head + 22px per field (preview) — fields beyond 8 truncated
  const t = TABLES[name];
  const shown = Math.min(t.fields.length, 8);
  return 30 + shown * 22 + (t.fields.length > 8 ? 22 : 0);
}

function renderTables() {
  Object.entries(TABLES).forEach(([name, t]) => {
    const c = CLUSTERS[t.cluster];
    const el = document.createElement("div");
    el.className = "table";
    el.dataset.name = name;
    el.dataset.cluster = t.cluster;
    el.style.cssText = `left:${t.x}px;top:${t.y}px;width:${t.w}px;--c:${c.color}`;
    const previewFields = t.fields.slice(0, 8);
    el.innerHTML = `
      <div class="table__head">
        <span>${name}</span>
        <span class="table__head-icon">${t.fields.length}f</span>
      </div>
      <div class="table__body">
        ${previewFields.map(f => `
          <div class="table__field">
            <span>
              ${f.pk ? '<span class="table__pk-icon">⚿</span>' : f.fk ? '<span class="table__fk-icon">⛓</span>' : '<span class="table__pk-icon" style="visibility:hidden">·</span>'}
              <span class="table__fname ${f.pk ? 'table__fname--pk' : f.fk ? 'table__fname--fk' : f.unique ? 'table__fname--unique' : ''}">${f.n}</span>
            </span>
            <span class="table__ftype">${f.t}</span>
          </div>`).join("")}
        ${t.fields.length > 8 ? `<div class="table__more">+ ${t.fields.length - 8} more fields · click to see all</div>` : ''}
      </div>`;
    el.addEventListener("click", (ev) => {
      ev.stopPropagation();
      selectTable(name);
    });
    canvas.appendChild(el);
  });
}

function renderClusters() {
  // Compute bounding box of each cluster (with padding)
  const pad = 28;
  Object.entries(TABLES).forEach(([name, t]) => {
    const box = CLUSTER_BOXES[t.cluster] || { x1: Infinity, y1: Infinity, x2: -Infinity, y2: -Infinity };
    box.x1 = Math.min(box.x1, t.x);
    box.y1 = Math.min(box.y1, t.y);
    box.x2 = Math.max(box.x2, t.x + t.w);
    box.y2 = Math.max(box.y2, t.y + tableHeight(name));
    CLUSTER_BOXES[t.cluster] = box;
  });

  Object.entries(CLUSTERS).forEach(([key, c]) => {
    const box = CLUSTER_BOXES[key];
    if (!box) return;
    const el = document.createElement("div");
    el.className = "cluster";
    el.dataset.cluster = key;
    el.style.cssText = `
      left:${box.x1 - pad}px;
      top:${box.y1 - pad}px;
      width:${box.x2 - box.x1 + pad * 2}px;
      height:${box.y2 - box.y1 + pad * 2}px;
      --c:${c.color};`;
    const lbl = document.createElement("div");
    lbl.className = "cluster__label";
    lbl.style.cssText = `--c:${c.color}`;
    lbl.textContent = c.label;
    el.appendChild(lbl);
    canvas.insertBefore(el, lines.nextSibling);
  });
}

function renderLegend() {
  legend.innerHTML = Object.entries(CLUSTERS).map(([key, c]) => `
    <span class="legend__item legend__item--active" data-cluster="${key}">
      <span class="legend__swatch" style="background:${c.color}"></span>
      ${c.label}
    </span>`).join("");
  legend.querySelectorAll(".legend__item").forEach(el => {
    el.addEventListener("click", () => {
      const k = el.dataset.cluster;
      if (activeClusters.has(k)) activeClusters.delete(k);
      else activeClusters.add(k);
      el.classList.toggle("legend__item--active");
      applyClusterFilter();
    });
  });
}

function applyClusterFilter() {
  document.querySelectorAll(".table").forEach(t => {
    const isActive = activeClusters.has(t.dataset.cluster);
    t.style.display = isActive ? "block" : "none";
  });
  document.querySelectorAll(".cluster").forEach(c => {
    const isActive = activeClusters.has(c.dataset.cluster);
    c.style.display = isActive ? "block" : "none";
  });
  renderRelationshipLines();
}

function renderRelationshipLines() {
  // Build pairs of FK relationships from the schema
  const pairs = [];
  Object.entries(TABLES).forEach(([from, t]) => {
    if (!activeClusters.has(t.cluster)) return;
    t.fields.forEach(f => {
      if (f.fk && TABLES[f.fk] && activeClusters.has(TABLES[f.fk].cluster)) {
        pairs.push({ from, to: f.fk, viaField: f.n });
      }
    });
  });

  const NS = "http://www.w3.org/2000/svg";
  lines.innerHTML = "";
  pairs.forEach((p, i) => {
    const a = TABLES[p.from];
    const b = TABLES[p.to];
    // Edge midpoints — pick the closer sides
    const ax = a.x + a.w / 2;
    const ay = a.y + tableHeight(p.from) / 2;
    const bx = b.x + b.w / 2;
    const by = b.y + tableHeight(p.to) / 2;
    // Anchor on right or left depending on direction
    const aRight = ax < bx;
    const ax1 = aRight ? a.x + a.w : a.x;
    const bx1 = aRight ? b.x : b.x + b.w;
    const ay1 = ay;
    const by1 = by;
    // Cubic bezier with horizontal control points
    const dx = Math.abs(bx1 - ax1);
    const c1x = ax1 + (aRight ? dx * 0.5 : -dx * 0.5);
    const c2x = bx1 + (aRight ? -dx * 0.5 : dx * 0.5);
    const path = document.createElementNS(NS, "path");
    path.setAttribute("d", `M ${ax1} ${ay1} C ${c1x} ${ay1}, ${c2x} ${by1}, ${bx1} ${by1}`);
    path.dataset.from = p.from;
    path.dataset.to = p.to;
    lines.appendChild(path);
  });
}

function selectTable(name) {
  if (selectedTable === name) {
    deselectTable();
    return;
  }
  selectedTable = name;
  const t = TABLES[name];
  const c = CLUSTERS[t.cluster];

  // Visual state
  document.querySelectorAll(".table").forEach(el => {
    el.classList.remove("table--highlight", "table--connected", "table--dimmed");
    if (el.dataset.name === name) {
      el.classList.add("table--highlight");
    } else {
      el.classList.add("table--dimmed");
    }
  });
  // Mark FK-connected tables (incoming + outgoing)
  const connected = new Set();
  t.fields.forEach(f => { if (f.fk) connected.add(f.fk); });
  Object.entries(TABLES).forEach(([n, tt]) => {
    if (tt.fields.some(f => f.fk === name)) connected.add(n);
  });
  connected.forEach(n => {
    const el = document.querySelector(`.table[data-name="${n}"]`);
    if (el) {
      el.classList.remove("table--dimmed");
      el.classList.add("table--connected");
    }
  });
  // Lines: highlight ones touching this table, dim others
  document.querySelectorAll(".lines path").forEach(p => {
    p.classList.remove("line--highlight", "line--dimmed");
    if (p.dataset.from === name || p.dataset.to === name) {
      p.classList.add("line--highlight");
    } else {
      p.classList.add("line--dimmed");
    }
  });

  // Drawer
  drawerHead.style.setProperty("--c", c.color);
  drawerTitle.textContent = name;
  drawerSubtitle.textContent = c.label;
  drawerBody.innerHTML = `
    <div class="drawer__section">
      <h3 class="drawer__section-title">Purpose</h3>
      <p class="drawer__desc">${t.desc}</p>
    </div>
    <div class="drawer__section">
      <h3 class="drawer__section-title">Fields · ${t.fields.length}</h3>
      ${t.fields.map(f => `
        <div class="drawer__field">
          <span class="drawer__field-name ${f.pk ? 'drawer__field-name--pk' : f.fk ? 'drawer__field-name--fk' : f.unique ? 'drawer__field-name--unique' : ''}">
            ${f.n}
            ${f.pk ? '<span class="drawer__field-badge drawer__field-badge--pk">PK</span>' : ''}
            ${f.fk ? `<span class="drawer__field-badge drawer__field-badge--fk">FK → ${f.fk}</span>` : ''}
            ${f.unique && !f.pk ? '<span class="drawer__field-badge drawer__field-badge--unique">UNIQUE</span>' : ''}
            ${f.idx ? '<span class="drawer__field-badge drawer__field-badge--idx">IDX</span>' : ''}
            ${f.note ? `<div style="font-size:11px;color:var(--ink-500);margin-top:2px;font-family:var(--font-display)">${f.note}</div>` : ''}
          </span>
          <span class="drawer__field-type">${f.t}</span>
        </div>`).join("")}
    </div>
    ${t.rels.length > 0 ? `
      <div class="drawer__section">
        <h3 class="drawer__section-title">Relationships · ${t.rels.length}</h3>
        ${t.rels.map(r => `
          <div class="drawer__rel">
            <span class="drawer__rel-target" data-target="${r.to}">→ ${r.to}</span>
            <span class="drawer__rel-kind">${r.kind}${r.via ? ` · ${r.via}` : ''}</span>
          </div>`).join("")}
      </div>` : ''}
  `;
  drawer.classList.add("drawer--open");

  // Wire relationship links to navigate
  drawerBody.querySelectorAll("[data-target]").forEach(el => {
    el.addEventListener("click", () => {
      const target = el.dataset.target;
      if (TABLES[target]) {
        selectTable(target);
        scrollToTable(target);
      }
    });
  });
}

function deselectTable() {
  selectedTable = null;
  document.querySelectorAll(".table").forEach(el => {
    el.classList.remove("table--highlight", "table--connected", "table--dimmed");
  });
  document.querySelectorAll(".lines path").forEach(p => {
    p.classList.remove("line--highlight", "line--dimmed");
  });
  drawer.classList.remove("drawer--open");
}

function scrollToTable(name) {
  const el = document.querySelector(`.table[data-name="${name}"]`);
  if (!el) return;
  const wrap = document.getElementById("canvasWrap");
  const elRect = el.getBoundingClientRect();
  const wrapRect = wrap.getBoundingClientRect();
  wrap.scrollTo({
    left: el.offsetLeft - wrapRect.width / 2 + el.offsetWidth / 2,
    top: el.offsetTop - wrapRect.height / 2 + el.offsetHeight / 2,
    behavior: "smooth",
  });
}

// ── Search ────────────────────────────────────────────────────────────────
searchInput.addEventListener("input", () => {
  const q = searchInput.value.toLowerCase().trim();
  if (!q) {
    document.querySelectorAll(".table").forEach(el => {
      el.style.opacity = "1";
      el.style.boxShadow = "";
    });
    return;
  }
  Object.entries(TABLES).forEach(([name, t]) => {
    const el = document.querySelector(`.table[data-name="${name}"]`);
    if (!el) return;
    const matches = name.toLowerCase().includes(q) || t.fields.some(f => f.n.toLowerCase().includes(q));
    if (matches) {
      el.style.opacity = "1";
      el.style.boxShadow = "0 0 0 3px var(--amber), 0 6px 16px rgba(180,83,9,0.18)";
    } else {
      el.style.opacity = "0.18";
      el.style.boxShadow = "";
    }
  });
});

// ── Reset ────────────────────────────────────────────────────────────────
resetBtn.addEventListener("click", () => {
  searchInput.value = "";
  searchInput.dispatchEvent(new Event("input"));
  deselectTable();
  activeClusters = new Set(Object.keys(CLUSTERS));
  legend.querySelectorAll(".legend__item").forEach(el => el.classList.add("legend__item--active"));
  applyClusterFilter();
  document.getElementById("canvasWrap").scrollTo({ left: 0, top: 0, behavior: "smooth" });
});

drawerClose.addEventListener("click", deselectTable);

// Click outside table to deselect (but allow click on canvas itself)
document.getElementById("canvasWrap").addEventListener("click", (ev) => {
  if (ev.target.closest(".table") || ev.target.closest(".drawer")) return;
  deselectTable();
});

// Keyboard escape
document.addEventListener("keydown", (ev) => {
  if (ev.key === "Escape") deselectTable();
});

// ── Boot ──────────────────────────────────────────────────────────────────
canvas.style.setProperty("--canvas-w", CANVAS_W + "px");
canvas.style.setProperty("--canvas-h", CANVAS_H + "px");
lines.setAttribute("viewBox", `0 0 ${CANVAS_W} ${CANVAS_H}`);

renderClusters();
renderTables();
renderLegend();
renderRelationshipLines();
</script>

</body>
</html>
