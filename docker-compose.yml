# ─────────────────────────────────────────────────────────────────────────────
#  docker-compose.yml — full stack (frontend + backend + DB) in one command
# ─────────────────────────────────────────────────────────────────────────────
#  Brings up:
#    - postgres   (port 5432, internal)
#    - api        (Fastify, port 3000 internal)
#    - web        (nginx serving HTML portals + reverse-proxying /api → api)
#                 (port 80, exposed)
#    - adminer    (DB browser, port 8081, exposed for dev)
#
#  After `docker compose up -d`:
#    Portals:     http://localhost/
#    API health:  http://localhost/api/v1/health
#    DB browser:  http://localhost:8081  (server: db, user: sudo, pass: sudo)
#
#  For production behind a real domain, put a TLS-terminating reverse proxy
#  (nginx/caddy/cloudflare) in front of port 80.
# ─────────────────────────────────────────────────────────────────────────────

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: sudo
      POSTGRES_PASSWORD: sudo
      POSTGRES_DB: sudo_portal
    volumes:
      - sudo_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sudo -d sudo_portal"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://sudo:sudo@db:5432/sudo_portal
    env_file:
      - .env
    expose:
      - "3000"
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./apps/api/prisma:/app/apps/api/prisma
    command: npm run dev --workspace apps/api

  # Background worker — processes the ScheduledJob queue (data exports,
  # backups, integration syncs, KPI cycle close, notification + webhook
  # retries). Same image as `api`, different entry command. Scale with
  # `docker compose up -d --scale worker=3` once you need it.
  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://sudo:sudo@db:5432/sudo_portal
    env_file:
      - .env
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./apps/api/prisma:/app/apps/api/prisma
    command: npm run worker:dev --workspace apps/api

  web:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
    volumes:
      - ./apps/web:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  # Optional: lightweight DB browser at http://localhost:8081
  # Server: db, User: sudo, Password: sudo, DB: sudo_portal
  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      - db

volumes:
  sudo_pg_data:
